name: Weekly Newsletter

on:
  schedule:
    # 5 PM EDT = 9 PM UTC (Sunday)
    # During EST (Nov-Mar) this fires at 4 PM ET instead — close enough for a newsletter
    - cron: '0 21 * * 0'
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send newsletter
        run: python scripts/generate_newsletter.py --send
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_RECIPIENT: ${{ secrets.NEWSLETTER_RECIPIENT }}
