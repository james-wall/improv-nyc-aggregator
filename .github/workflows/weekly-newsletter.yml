name: Weekly Newsletter

on:
  schedule:
    # 5 PM EDT = 9 PM UTC (Sunday)
    # During EST (Nov-Mar) this fires at 4 PM ET instead — close enough for a newsletter
    - cron: '0 21 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Send mode'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - send

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # archive issues are committed back to main

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send newsletter
        run: |
          if [ "${{ github.event.inputs.mode }}" = "draft" ]; then
            python scripts/generate_newsletter.py --send --draft
          else
            python scripts/generate_newsletter.py --send
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}

      - name: Commit archived issue
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/archive/
          if git diff --staged --quiet; then
            echo "No archive changes to commit"
          else
            git commit -m "Archive issue $(date -u +%Y-%m-%d)"
            git push
          fi
